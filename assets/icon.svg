<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bb86fc"/>
      <stop offset="100%" stop-color="#03dac6"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado escuro -->
  <rect width="256" height="256" rx="52" ry="52" fill="url(#bg)"/>

  <!-- Brilho sutil canto superior esquerdo -->
  <circle cx="40" cy="40" r="90" fill="#bb86fc" opacity="0.07"/>

  <!-- Brilho sutil canto inferior direito -->
  <circle cx="220" cy="220" r="90" fill="#03dac6" opacity="0.07"/>

  <!-- Letra S em gradiente -->
  <text x="128" y="188"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="172"
    font-weight="900"
    text-anchor="middle"
    fill="url(#grad)">S</text>

  <!-- Linha accent abaixo do S -->
  <rect x="86" y="207" width="84" height="7" rx="3.5" fill="url(#grad)" opacity="0.65"/>
</svg>
